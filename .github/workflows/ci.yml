name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend — lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .

  backend-tests:
    name: Backend — tests (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: ${{ runner.os }}-uv-
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      # pytest-split divides the suite into N deterministic shards that run in
      # parallel across the matrix. Add a committed .test_durations file later
      # to split by time instead of by test count.
      - name: Run tests (shard ${{ matrix.shard }}/3)
        run: python -m pytest -q --splits 3 --group ${{ matrix.shard }}

  migrations:
    name: Backend — migrations apply on Postgres
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # The definitive prod check: the same `alembic upgrade head` the
      # container runs at startup, against a real Postgres.
      DATABASE_URL: postgresql+asyncpg://alma:alma@localhost:5432/alma
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: alma
          POSTGRES_PASSWORD: alma
          POSTGRES_DB: alma
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"
      - name: Apply every migration on a fresh database
        run: alembic upgrade head

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint (eslint)
        run: npm run lint
      - name: Build (type-check + production build)
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  smoke:
    name: Smoke — full stack (Postgres + API + web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start the stack
        run: docker compose up --build -d
      - name: Run smoke test
        run: bash scripts/smoke.sh http://localhost:8000 http://localhost:3000
      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Tear down
        if: always()
        run: docker compose down -v
